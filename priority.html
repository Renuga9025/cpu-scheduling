<!DOCTYPE html>
<html>
<head>
<title>Priority</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header><h1>CPU Scheduling Simulator</h1></header>

<nav>
<a href="index.html">Home</a>
<a href="fcfs.html">FCFS</a>
<a href="sjf.html">SJF</a>
<a href="priority.html">Priority</a>
<a href="rr.html">Round Robin</a>
</nav>

<div class="container">

<h2>Priority Scheduling</h2>

<input type="number" id="n" placeholder="Processes">
<button onclick="createInputs()">Create Inputs</button>

<div id="inputs"></div>

<button onclick="runPriority()">Calculate</button>

<div id="output"></div>

</div>

<script>
function createInputs(){
    let n=document.getElementById("n").value;
    let html="";
    for(let i=0;i<n;i++){
        html+=`
        <h4>P${i+1}</h4>
        AT:<input id="at${i}">
        BT:<input id="bt${i}">
        Priority:<input id="pr${i}"><br>`;
    }
    document.getElementById("inputs").innerHTML=html;
}

function runPriority(){
    let n=document.getElementById("n").value;
    let p=[];

    for(let i=0;i<n;i++){
        p.push({
            id:"P"+(i+1),
            at:+document.getElementById("at"+i).value,
            bt:+document.getElementById("bt"+i).value,
            pr:+document.getElementById("pr"+i).value
        });
    }

    p.sort((a,b)=>a.pr-b.pr);

    let time=0;

    p.forEach(proc=>{
        proc.wt=time;
        time+=proc.bt;
        proc.tat=proc.wt+proc.bt;
    });

    display(p);
}

function display(p){
    let table="<table><tr><th>P</th><th>AT</th><th>BT</th><th>Priority</th><th>WT</th><th>TAT</th></tr>";
    p.forEach(proc=>{
        table+=`<tr>
        <td>${proc.id}</td>
        <td>${proc.at}</td>
        <td>${proc.bt}</td>
        <td>${proc.pr}</td>
        <td>${proc.wt}</td>
        <td>${proc.tat}</td>
        </tr>`;
    });
    table+="</table>";
    document.getElementById("output").innerHTML=table;
}
</script>

</body>
</html>
